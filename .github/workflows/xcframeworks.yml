name: Build XCFrameworks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"
      release_tag:
        description: "Release tag/title override (default: parsed from LAME version.h)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - name: Resolve release tag
        id: release_tag
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ -n "${INPUT_RELEASE_TAG}" ]]; then
            RELEASE_TAG="${INPUT_RELEASE_TAG}"
          else
            VERSION_HEADER="Sources/lame/libmp3lame/include/version.h"
            MAJOR="$(awk '/^# *define +LAME_MAJOR_VERSION +[0-9]+/ {print $4; exit}' "${VERSION_HEADER}")"
            MINOR="$(awk '/^# *define +LAME_MINOR_VERSION +[0-9]+/ {print $4; exit}' "${VERSION_HEADER}")"
            PATCH="$(awk '/^# *define +LAME_PATCH_VERSION +[0-9]+/ {print $4; exit}' "${VERSION_HEADER}")"
            if [[ -z "${MAJOR}" || -z "${MINOR}" || -z "${PATCH}" ]]; then
              echo "Failed to parse LAME version from ${VERSION_HEADER}" >&2
              exit 1
            fi
            RELEASE_TAG="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build XCFrameworks
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
        run: |
          chmod +x scripts/build_xcframeworks.sh
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            VERSION_TAG="${GITHUB_SHA::12}"
          else
            VERSION_TAG="${RELEASE_TAG}"
          fi
          scripts/build_xcframeworks.sh --output-dir artifacts --version-tag "$VERSION_TAG" --zip

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcframeworks-${{ github.sha }}
          path: |
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish to versioned release
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "Automated prebuilt XCFramework assets."
          fi

          # Remove previously uploaded version-suffixed XCFramework assets.
          while IFS= read -r asset_name; do
            case "$asset_name" in
              SwiftLame-*.xcframework.zip|lamemp3-*.xcframework.zip)
                gh release delete-asset "$RELEASE_TAG" "$asset_name" -y
                ;;
            esac
          done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')

          gh release upload "$RELEASE_TAG" \
            "artifacts/SwiftLame.xcframework.zip" \
            "artifacts/lamemp3.xcframework.zip" \
            artifacts/SHA256SUMS.txt \
            --clobber
